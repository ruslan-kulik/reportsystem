{% extends 'reports/base.html' %}
{% block content %}
<h2>Все отчёты</h2>
<table class="generic-table">
    <tr><th>ID</th><th>Менеджер</th><th>Дата</th><th>Действия</th></tr>
    {% for r in reports %}
    <tr>
        <td>{{ r.id }}</td>
        <td><a href="{% url 'manager_detail' r.manager.id %}">{{ r.manager.full_name }}</a></td>
        <td>{{ r.report_date }}</td>
        <td>
            <a href="{% url 'export_pdf' r.id %}" class="btn btn-sm" target="_blank">PDF</a>
            <a href="{% url 'preview_xlsx_js' r.id %}" class="btn btn-sm" target="_blank" style="background: blue">XLSX</a>
            <a href="{% url 'preview_docx_js' r.id %}" class="btn btn-sm" target="_blank" style="background: green">DOCX</a>
            <a href="{% url 'export_xml' r.id %}" class="btn btn-sm" target="_blank" style="background: orange">XML</a>
        </td>
    </tr>
    {% empty %}<tr><td colspan="4">Отчётов нет</td></tr>
    {% endfor %}
</table>
{% endblock %}
