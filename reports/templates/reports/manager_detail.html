{% extends 'reports/base.html' %}
{% block content %}
<h2>Отчёты менеджера: {{ manager.full_name }}</h2>
<a href="{% url 'report_list' %}" class="btn">← Назад</a>
<table class="generic-table">
    <tr><th>ID</th><th>Дата</th><th>Действия</th></tr>
    {% for r in reports %}
    <tr>
        <td>{{ r.id }}</td>
        <td>{{ r.report_date }}</td>
        <td>
            <a href="{% url 'export_pdf' r.id %}" class="btn btn-sm" target="_blank">PDF</a>
            <a href="{% url 'export_docx' r.id %}" class="btn btn-sm" target="_blank" style="background: #071ff5">DOCX</a>
            <a href="{% url 'export_xlsx' r.id %}" class="btn btn-sm" target="_blank" style="background: green">XLSX</a>
            <a href="{% url 'export_xml' r.id %}" class="btn btn-sm" target="_blank" style="background: orange">XML</a>
        </td>
    </tr>
    {% endfor %}
</table>
{% endblock %}
